<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>بيانات الحاج – نظام الهدي</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Tajawal', sans-serif;
  background: linear-gradient(135deg, #1e2d44 60%, #26354d);
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
}

/* تأثير النقاط */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 0 0, rgba(255,255,255,0.07) 0, rgba(255,255,255,0.07) 2px, transparent 2px),
    radial-gradient(circle at 20px 20px, rgba(255,255,255,0.05) 0, rgba(255,255,255,0.05) 2px, transparent 2px);
  background-size: 40px 40px;
  opacity: 0.35;
  z-index: 0;
}

/* الشعار */
.logo-box {
  width: 90px;
  height: 90px;
  background: #fff;
  border-radius: 14px;
  border: 3px solid #d4af37;
  padding: 6px;
  margin: 25px auto 10px auto;
  box-shadow: 0 0 12px rgba(0,0,0,0.25);
}

.logo-box img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* اسم الشركة */
.brand-line {
  font-size: 28px;
  font-weight: 900;
  color: #d4af37;
  text-align: center;
  margin-bottom: 25px;
  text-shadow: 0 0 8px rgba(212,175,55,0.45);
  letter-spacing: 1px;
}

/* المحتوى */
.container {
  position: relative;
  z-index: 2;
  width: 92%;
  max-width: 450px;
  margin: 0 auto 40px auto;
}

/* العنوان */
.header-title {
  font-size: 26px;
  font-weight: 800;
  color: #d4af37;
  text-align: center;
  margin-bottom: 25px;
}

/* بطاقة */
.card {
  background: #ffffff;
  border-radius: 16px;
  padding: 22px;
  border: 2px solid #d4af37;
  margin-bottom: 18px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.25);
}

.card-title {
  font-size: 18px;
  font-weight: 800;
  color: #1e2d44;
  margin-bottom: 10px;
}

.status {
  font-size: 20px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 15px;
  color: #333;
}

.status-done {
  color: #2e7d32 !important;
}

/* أزرار */
.btn-row {
  display: flex;
  gap: 10px;
  justify-content: center;
}

.btn {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
}

.btn-main {
  background: #d4af37;
  color: #1e2d44;
}

.btn-main:hover {
  background: #c19c32;
}

.btn-danger {
  background: #8b1e1e;
  color: #fff;
}

.btn-danger:hover {
  background: #6f1616;
}

.btn-secondary {
  background: #1e2d44;
  color: #fff;
  margin-top: 10px;
}

.btn-secondary:hover {
  background: #162233;
}

/* الفوتر */
.footer {
  text-align: center;
  color: #d4af37;
  font-size: 16px;
  font-weight: 700;
  margin-top: 40px;
  margin-bottom: 20px;
  opacity: 0.9;
  text-shadow: 0 0 6px rgba(212,175,55,0.35);
}
</style>
</head>

<body>

<div class="logo-box">
  <img src="https://i.imgur.com/qV5bfob.gif">
</div>

<div class="brand-line">شركة طوى الشرق</div>

<div class="container">

  <div class="header-title">بيانات الحاج</div>

  <div class="card">
    <div class="card-title">👤 الاسم</div>
    <div class="status" id="name">—</div>
  </div>

  <div class="card">
    <div class="card-title">📜 نص التوكيل</div>
    <div class="status" id="tawkeelText">—</div>
  </div>

  <div class="card">
    <div class="card-title">📝 التوكيل</div>
    <div class="status" id="tawkeel">—</div>

    <div class="btn-row">
      <button id="doTawkeel" class="btn btn-main">✔ تم التوكيل</button>
      <button id="undoTawkeel" class="btn btn-danger" disabled>🔄 إلغاء</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🎯 الرمي</div>
    <div class="status" id="rami">—</div>

    <div class="btn-row">
      <button id="doRami" class="btn btn-main">✔ تم الرمي</button>
      <button id="undoRami" class="btn btn-danger" disabled>🔄 إلغاء</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🔪 الذبح</div>
    <div class="status" id="thabh">—</div>

    <div class="btn-row">
      <button id="doThabh" class="btn btn-main">✔ تم الذبح</button>
      <button id="undoThabh" class="btn btn-danger" disabled>🔄 إلغاء</button>
    </div>
  </div>

  <button class="btn btn-secondary" onclick="goBack()">⬅ رجوع</button>

</div>

<div class="footer">© شركة طوى الشرق لحجاج الداخل – 1448 هـ</div>

<script>
/* قراءة رقم البحث من الرابط */
const urlParams = new URLSearchParams(window.location.search);
const searchValue = urlParams.get("search");

/* روابط النظام */
const SHEET_URL =
  "https://opensheet.elk.sh/1a816cO4kgLlBUHyu7okjEKcL0DydqqW0wWmAW9gxGME/قاعدة_البيانات";

const API_URL =
  "https://script.google.com/macros/s/AKfycbztL1redTyYlHZSyQgsvICHLAe62IRFHSEM6MDL5NAVcYosFlO1FJgeSea89GzSPy1J/exec";

/* تحميل البيانات الأساسية فقط (الاسم + نص التوكيل) */
async function loadData() {
  const res = await fetch(SHEET_URL);
  const rows = await res.json();

  let found = rows.find(r =>
    r["رقم الهوية"] == searchValue ||
    r["رقم الجوال"] == searchValue
  );

  if (!found) return;

  document.getElementById("name").innerHTML = found["الاسم"];
  loadTawkeelText();
}

/* تحميل نص التوكيل */
async function loadTawkeelText() {
  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action: "get_tawkeel_text" })
  });

  const txt = await res.text();
  document.getElementById("tawkeelText").innerHTML = txt || "—";
}

/* API */
async function callApi(payload) {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });
}

/* التوكيل */
doTawkeel.onclick = () => {
  tawkeel.innerHTML = "تم التوكيل";
  tawkeel.classList.add("status-done");

  doTawkeel.disabled = true;
  undoTawkeel.disabled = false;

  callApi({ action: "tawkeel", id: searchValue });
};

undoTawkeel.onclick = () => {
  tawkeel.innerHTML = "—";
  tawkeel.classList.remove("status-done");

  doTawkeel.disabled = false;
  undoTawkeel.disabled = true;

  callApi({ action: "cancel_tawkeel", id: searchValue });
};

/* الرمي */
doRami.onclick = () => {
  rami.innerHTML = "تم الرمي";
  rami.classList.add("status-done");

  doRami.disabled = true;
  undoRami.disabled = false;

  callApi({ action: "rami", id: searchValue });
};

undoRami.onclick = () => {
  rami.innerHTML = "—";
  rami.classList.remove("status-done");

  doRami.disabled = false;
  undoRami.disabled = true;

  callApi({ action: "cancel_rami", id: searchValue });
};

/* الذبح */
doThabh.onclick = () => {
  thabh.innerHTML = "تم الذبح";
  thabh.classList.add("status-done");

  doThabh.disabled = true;
  undoThabh.disabled = false;

  callApi({ action: "thabh", id: searchValue });
};

undoThabh.onclick = () => {
  thabh.innerHTML = "—";
  thabh.classList.remove("status-done");

  doThabh.disabled = false;
  undoThabh.disabled = true;

  callApi({ action: "cancel_thabh", id: searchValue });
};

/* الرجوع */
function goBack() {
  window.location.href = "index.html";
}

/* تحميل أولي */
loadData();
</script>

</body>
</html>
