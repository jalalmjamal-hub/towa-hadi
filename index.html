<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>نظام الهدي – شركة طوى الشرق</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Tajawal', sans-serif;
  background: linear-gradient(135deg, #1e2d44 60%, #26354d);
  color: #fff;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

/* تأثير النقاط الفاخرة */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 0 0, rgba(255,255,255,0.07) 0, rgba(255,255,255,0.07) 2px, transparent 2px),
    radial-gradient(circle at 20px 20px, rgba(255,255,255,0.05) 0, rgba(255,255,255,0.05) 2px, transparent 2px);
  background-size: 40px 40px;
  opacity: 0.35;
  z-index: 0;
}

/* المحتوى */
.container {
  position: relative;
  z-index: 2;
  width: 92%;
  max-width: 420px;
  margin: 60px auto;
  text-align: center;
}

/* الشعار */
.logo-box {
  width: 110px;
  height: 110px;
  background: #fff;
  border-radius: 16px;
  border: 3px solid #d4af37;
  padding: 8px;
  margin: 0 auto 10px auto;
  box-shadow: 0 0 12px rgba(0,0,0,0.25);
}

.logo-box img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* السطر الفاخر */
.brand-line {
  font-size: 20px;
  font-weight: 800;
  color: #d4af37;
  text-align: center;
  margin-top: 10px;
  margin-bottom: 25px;
  letter-spacing: 0.5px;
  text-shadow: 0 0 8px rgba(212,175,55,0.35);
}

/* البطاقة */
.card {
  background: #ffffff;
  border-radius: 16px;
  padding: 28px 22px;
  border: 2px solid #d4af37;
  box-shadow: 0 8px 25px rgba(0,0,0,0.25);
}

/* الإدخال */
input {
  width: 90%;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #bbb;
  font-size: 18px;
  text-align: center;
  margin-bottom: 12px;
}

/* زر البحث */
button {
  width: 90%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: #d4af37;
  color: #1e2d44;
  font-size: 18px;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.25);
}

button:hover {
  background: #c19c32;
}

/* رسالة الخطأ */
#error {
  margin-top: 10px;
  color: #b71c1c;
  font-size: 15px;
  display: none;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo-box">
    <img src="https://i.imgur.com/qV5bfob.gif">
  </div>

  <!-- السطر الفاخر الجديد -->
  <div class="brand-line">شركة طوى الشرق لحجاج الداخل – 1448 هـ</div>

  <div class="card">
    <input id="inputVal" type="text" placeholder="رقم الهوية أو الجوال">
    <button onclick="go()">بحث</button>
    <div id="error">⚠️ الرقم غير موجود</div>
  </div>

</div>

<script>
function go() {
  const v = document.getElementById("inputVal").value.trim();
  if (!v) return;

  // الانتقال لصفحة البيانات
  window.location.href = "result.html?search=" + encodeURIComponent(v);
}
</script>

</body>
</html>
