<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <link rel="icon" type="image/png" href="favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>نظام الهدي الإلكتروني – شركة طوى الشرق</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
html, body {
  width: 100%;
  overflow-x: hidden;
}

/* الخلفية + النقش */
body {
  margin: 0;
  padding: 0;
  padding-top: 40px;
  font-family: 'Tajawal', sans-serif;
  background: linear-gradient(135deg, #1e2d44 60%, #26354d);
  color: #fff;
  position: relative;
  min-height: 100vh;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 0 0, rgba(255,255,255,0.06) 0, rgba(255,255,255,0.06) 2px, transparent 2px),
    radial-gradient(circle at 20px 20px, rgba(255,255,255,0.04) 0, rgba(255,255,255,0.04) 2px, transparent 2px);
  background-size: 40px 40px;
  opacity: 0.35;
  z-index: 0;
}

/* رفع المحتوى فوق النقش */
.center-logo-box,
.company-title,
.company-subtitle,
.main-card,
.footer {
  position: relative;
  z-index: 2;
}

/* الشعار */
.center-logo-box {
  width: 95px;
  height: 95px;
  background: #ffffff;
  padding: 6px;
  border-radius: 14px;
  border: 3px solid #d4af37;
  box-shadow: 0 0 10px rgba(0,0,0,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 10px auto;
}

.center-logo-box img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.company-title {
  text-align: center;
  font-size: 22px;
  font-weight: 800;
  color: #d4af37;
  margin-bottom: 4px;
}

.company-subtitle {
  text-align: center;
  font-size: 14px;
  color: #ffffff;
  opacity: .85;
  margin-bottom: 20px;
}

/* البطاقة */
.main-card {
  width: 92%;
  max-width: 440px;
  margin: 10px auto 40px auto;
  padding: 26px 22px;
  border-radius: 14px;
  background: #ffffff;
  border: 2px solid #d4af37;
  box-shadow: 0 6px 20px rgba(0,0,0,0.25);
}

.card-section {
  transition: opacity 0.35s ease, transform 0.35s ease;
}

.hidden {
  opacity: 0;
  transform: translateY(-10px);
  height: 0;
  overflow: hidden;
}

.visible {
  opacity: 1;
  transform: translateY(0);
  height: auto;
}

/* صفحة الدخول */
#loginSection .icon {
  font-size: 60px;
  margin-bottom: 12px;
  color: #1e2d44;
  text-align: center;
}

#loginSection h3 {
  margin: 0 0 12px 0;
  color: #1e2d44;
  text-align: center;
  font-size: 20px;
  font-weight: 800;
}

#loginSection input,
#loginSection button {
  width: 90%;
  margin: 0 auto;
  display: block;
  padding: 14px;
  border-radius: 10px;
  font-size: 17px;
  text-align: center;
}

#loginSection input {
  border: 1px solid #bbb;
  background: #fafafa;
  color: #333;
  margin-top: 10px;
  margin-bottom: 6px;
}

.helper-text {
  font-size: 13px;
  color: #666;
  margin-bottom: 12px;
  text-align: center;
}

#loginSection button {
  border: none;
  cursor: pointer;
  font-weight: 800;
  color: #1e2d44;
  background: #d4af37;
  box-shadow: 0 2px 6px rgba(0,0,0,0.25);
}

#loader {
  display:none;
  text-align:center;
  margin-top:8px;
  color:#1e2d44;
}

#loginError {
  margin-top: 8px;
  color: #c62828;
  font-size: 14px;
  display: none;
  text-align: center;
}

/* صفحة النتائج */
.result-title {
  text-align: center;
  font-size: 20px;
  font-weight: 800;
  color: #1e2d44;
  margin-bottom: 18px;
}

.info-card {
  background: #ffffff;
  border: 2px solid #d4af37;
  padding: 14px;
  border-radius: 10px;
  margin-bottom: 12px;
}

.info-title {
  font-size: 15px;
  font-weight: 700;
  color: #1e2d44;
  margin-bottom: 6px;
}

.status {
  font-size: 16px;
  font-weight: 600;
  text-align: center;
  margin-bottom: 25px;
  color: #333;
}

.status-done {
  color: #2e7d32 !important;
  font-weight: 800 !important;
}

.actions-row { display:flex; gap:8px; justify-content:center; }

.action-btn {
  padding: 9px 14px;
  border-radius: 8px;
  border: 0;
  cursor: pointer;
  font-weight: 700;
  color:#1e2d44;
  background: #d4af37;
  font-size: 14px;
}

.action-btn.undo {
  background: #8b1e1e;
  color: #fff;
}

.back-btn {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  background: #555;
  color: white;
  border: none;
  font-weight: 700;
  cursor: pointer;
}

/* Footer */
.footer {
  text-align: center;
  font-size: 13px;
  color: #d4af37;
  margin-top: 20px;
  margin-bottom: 20px;
}

/* نسخة الكمبيوتر — توسيع البطاقة */
@media (min-width: 900px) {
  .main-card {
    max-width: 900px;
    padding: 40px 50px;
  }

  #loginSection input,
  #loginSection button {
    width: 60%;
    font-size: 20px;
  }

  .company-title {
    font-size: 28px;
  }

  .company-subtitle {
    font-size: 18px;
  }

  .info-card {
    padding: 20px;
  }

  .status {
    font-size: 20px;
  }

  .action-btn {
    font-size: 16px;
    padding: 12px 20px;
  }
}

/* نسخة الجوال */
@media (max-width: 600px) {
  html {
    font-size: 18px;
  }

  body {
    padding-top: 24px;
  }

  .main-card {
    max-width: 480px;
  }

  #loginSection input,
  #loginSection button {
    font-size: 18px;
    padding: 15px;
  }

  .company-title {
    font-size: 24px;
  }

  .company-subtitle {
    font-size: 15px;
  }
}
.action-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
#thabh {
  color: #d32f2f !important;   /* أحمر واضح */
  font-weight: 700;
}
</style>
</head>

<body>

<div class="center-logo-box">
  <img src="https://i.imgur.com/qV5bfob.gif">
</div>

<div class="company-title">شركة طوى الشرق لحجاج الداخل</div>
<div class="company-subtitle">نظام إدارة الهدي والنسك</div>

<div class="main-card">

  <div id="loginSection" class="card-section visible">
    <div class="icon">🕋</div>
    <h3>الاستعلام عن حالة الحاج</h3>

    <input id="loginInput" type="text" placeholder="رقم الهوية أو الجوال">
    <div class="helper-text">أدخل رقم الهوية أو رقم الجوال المكوّن من 10 أرقام</div>

    <button onclick="startSearch()">بحث</button>

    <div id="loader">جاري البحث…</div>
    <div id="loginError">⚠️ الرقم غير موجود في النظام</div>
  </div>

  <div id="resultSection" class="card-section hidden">

    <div class="result-title">بيانات الحاج</div>

    <div class="info-card">
      <div class="info-title">📜 نص التوكيل</div>
      <div class="status" id="tawkeelText">—</div>
    </div>

    <div class="info-card">
      <div class="info-title">👤 الاسم</div>
      <div class="status" id="name">—</div>
    </div>

    <div class="info-card">
      <div class="info-title">📝 التوكيل</div>
      <div class="status" id="tawkeel">—</div>

      <div class="actions-row">
        <button id="doTawkeel" class="action-btn">✔ تم التوكيل</button>
        <button id="undoTawkeel" class="action-btn undo">🔄 إلغاء التوكيل</button>
      </div>
    </div>

    <div class="info-card">
      <div class="info-title">🎯 الرمي</div>
      <div class="status" id="rami">—</div>

      <div class="actions-row">
        <button id="doRami" class="action-btn">✔ تم الرمي</button>
        <button id="undoRami" class="action-btn undo">🔄 إلغاء الرمي</button>
      </div>
    </div>

    <div class="info-card">
      <div class="info-title">🔪 الذبح</div>
      <div class="status" id="thabh">—</div>
    </div>
<button class="back-btn" style="background:#1e2d44;" onclick="refreshData()">🔄 تحديث البيانات</button>
    <button class="back-btn" onclick="goBack()">⬅ رجوع</button>

  </div>

</div>

<div class="footer">
  © شركة طوى الشرق لحجاج الداخل – 1448 هـ
</div>

<script>
// رابط قراءة الشيت مباشرة (JSON)
const SHEET_URL =
  "https://opensheet.elk.sh/1a816cO4kgLlBUHyu7okjEKcL0DydqqW0wWmAW9gxGME/قاعدة_البيانات";

// رابط Apps Script للتحديث
const API_URL = "https://script.google.com/macros/s/AKfycbztL1redTyYlHZSyQgsvICHLAe62IRFHSEM6MDL5NAVcYosFlO1FJgeSea89GzSPy1J/exec";

let currentIdOrMobile = "";

// إدخال Enter
document.getElementById("loginInput").addEventListener("keydown", function (e) {
  if (e.key === "Enter") {
    e.preventDefault();
    startSearch();
  }
});

// الرجوع
function goBack() {
  document.getElementById("resultSection").classList.add("hidden");
  document.getElementById("resultSection").classList.remove("visible");

  document.getElementById("loginSection").classList.remove("hidden");
  document.getElementById("loginSection").classList.add("visible");
}

// الانتقال للنتيجة
function slideToResult() {
  document.getElementById("loginSection").classList.add("hidden");
  document.getElementById("loginSection").classList.remove("visible");

  document.getElementById("resultSection").classList.remove("hidden");
  document.getElementById("resultSection").classList.add("visible");
}

// بدء البحث
function startSearch() {
  const val = document.getElementById("loginInput").value.trim();
  if (!val) return;

  document.getElementById("loginError").style.display = "none";
  document.getElementById("loader").style.display = "block";

  searchFromSheet(val);
}

// توحيد صيغة الجوال
function normalizePhone(raw) {
  if (!raw) return "";
  let p = String(raw).trim().replace(/\s+/g, "");

  if (p.startsWith("+966")) p = p.substring(4);
  else if (p.startsWith("00966")) p = p.substring(5);

  if (p.startsWith("05")) p = p.substring(1);
  else if (p.startsWith("0") && p.length >= 9) p = p.substring(1);

  return p;
}

// توحيد الهوية
function normalizeId(raw) {
  if (!raw) return "";
  return String(raw).trim().replace(/\s+/g, "");
}

// البحث من الشيت
async function searchFromSheet(input) {
  try {
    const res = await fetch(SHEET_URL);
    const rows = await res.json();

    document.getElementById("loader").style.display = "none";

    const searchVal = String(input).trim();
    const normalizedSearchPhone = normalizePhone(searchVal);
    const normalizedSearchId = normalizeId(searchVal);

    let found = null;

    for (const row of rows) {
      const id = normalizeId(row["رقم الهوية"]);
      const mobileNorm = normalizePhone(row["رقم الجوال"]);

      if (
        id === normalizedSearchId ||
        mobileNorm === normalizedSearchPhone ||
        mobileNorm.endsWith(normalizedSearchPhone)
      ) {
        found = row;
        break;
      }
    }

    if (!found) {
      document.getElementById("loginError").style.display = "block";
      return;
    }

    currentIdOrMobile = searchVal;

    fillResult(found);
    slideToResult();
    await loadTawkeelText();
  } catch (err) {
    console.log("ERROR searchFromSheet:", err);
    document.getElementById("loader").style.display = "none";
    document.getElementById("loginError").style.display = "block";
  }
}

// تعبئة البيانات
function fillResult(row) {
  document.getElementById("name").innerHTML = row["الاسم"] || "—";

  const tawkeel = row["حالة التوكيل"] || "";
  const rami = row["حالة الرمي"] || "";
  const zabh = row["حالة الذبح"] || "";

  const t = document.getElementById("tawkeel");
  t.innerHTML = tawkeel || "—";
  t.classList.toggle("status-done", tawkeel === "تم التوكيل");

  const r = document.getElementById("rami");
  r.innerHTML = rami || "—";
  r.classList.toggle("status-done", rami === "تم الرمي");

  document.getElementById("thabh").innerHTML = zabh || "—";

  setButtonsState(tawkeel === "تم التوكيل", rami === "تم الرمي");
}

// استدعاء API
async function callApi(payload) {
  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });

  const text = await res.text();
  try {
    return JSON.parse(text);
  } catch (e) {
    console.log("RAW RESPONSE:", text);
    return null;
  }
}

// جلب نص التوكيل
async function loadTawkeelText() {
  try {
    const txt = await callApi({ action: "get_tawkeel_text" });
    document.getElementById("tawkeelText").innerHTML = txt || "—";
  } catch {
    document.getElementById("tawkeelText").innerHTML = "—";
  }
}

// تفعيل وتعطيل الأزرار
function setButtonsState(tawkeelState, ramiState) {
  document.getElementById("doTawkeel").disabled = tawkeelState;
  document.getElementById("undoTawkeel").disabled = !tawkeelState;

  document.getElementById("doRami").disabled = ramiState;
  document.getElementById("undoRami").disabled = !ramiState;
}

// تحديث التوكيل
async function updateTawkeel() {
  if (!currentIdOrMobile) return;

  await callApi({ action: "tawkeel", id: currentIdOrMobile });

  document.getElementById("tawkeel").innerHTML = "تم التوكيل";
  document.getElementById("tawkeel").classList.add("status-done");

  // تحديث حالة الأزرار
  const ramiState = document.getElementById("rami").innerHTML === "تم الرمي";
  setButtonsState(true, ramiState);
}
// إلغاء التوكيل
async function undoTawkeel() {
  if (!currentIdOrMobile) return;

  await callApi({ action: "cancel_tawkeel", id: currentIdOrMobile });

  document.getElementById("tawkeel").innerHTML = "—";
  document.getElementById("tawkeel").classList.remove("status-done");

  // تحديث حالة الأزرار
  const ramiState = document.getElementById("rami").innerHTML === "تم الرمي";
  setButtonsState(false, ramiState);
}
// تحديث الرمي
async function updateRami() {
  if (!currentIdOrMobile) return;

  await callApi({ action: "rami", id: currentIdOrMobile });

  document.getElementById("rami").innerHTML = "تم الرمي";
  document.getElementById("rami").classList.add("status-done");

  // تحديث حالة الأزرار
  const tawkeelState = document.getElementById("tawkeel").innerHTML === "تم التوكيل";
  setButtonsState(tawkeelState, true);
}
// إلغاء الرمي
async function undoRami() {
  if (!currentIdOrMobile) return;

  await callApi({ action: "cancel_rami", id: currentIdOrMobile });

  document.getElementById("rami").innerHTML = "—";
  document.getElementById("rami").classList.remove("status-done");

  // تحديث حالة الأزرار
  const tawkeelState = document.getElementById("tawkeel").innerHTML === "تم التوكيل";
  setButtonsState(tawkeelState, false);
}
// ربط الأزرار
document.getElementById("doTawkeel").onclick = updateTawkeel;
document.getElementById("undoTawkeel").onclick = undoTawkeel;
document.getElementById("doRami").onclick = updateRami;
document.getElementById("undoRami").onclick = undoRami;
async function refreshData() {
  if (!currentIdOrMobile) return;

  // إظهار حالة تحميل بسيطة
  document.getElementById("tawkeel").innerHTML = "…";
  document.getElementById("rami").innerHTML = "…";
  document.getElementById("thabh").innerHTML = "…";

  try {
    // إعادة البحث من الشيت
    const res = await fetch(SHEET_URL);
    const rows = await res.json();

    const searchVal = currentIdOrMobile.trim();
    const normalizedSearchPhone = normalizePhone(searchVal);
    const normalizedSearchId = normalizeId(searchVal);

    let found = null;

    for (const row of rows) {
      const id = normalizeId(row["رقم الهوية"]);
      const mobileNorm = normalizePhone(row["رقم الجوال"]);

      if (
        id === normalizedSearchId ||
        mobileNorm === normalizedSearchPhone ||
        mobileNorm.endsWith(normalizedSearchPhone)
      ) {
        found = row;
        break;
      }
    }

    if (!found) return;

    // تحديث الواجهة
    fillResult(found);
    await loadTawkeelText();

  } catch (e) {
    console.log("refresh error:", e);
  }
}
</script>

</body>
</html>
